# ============================================================================
# DPO (Direct Preference Optimisation) Configuration
# ============================================================================
# Override any value via CLI dot-notation:
#   accelerate launch \
#      --num_machines 1 \
#      --num_processes 4 \
#      --dynamo_backend=inductor \
#      --use_deepspeed \
#      --same_network \
#      --rdzv_backend static \
#      --mixed_precision bf16 \
#      scripts/train.py \
#      --config configs/trl/dpo.yaml \
#      training.max_steps=100 \
#      offline=true
# ============================================================================

method: dpo
backend: trl
run_name: null                               # auto-generated from model + datasets if null
offline: false                               # set true to disable all HuggingFace / wandb network calls


# -- Container ---------------------------------------------------------------
container:
  image: /leonardo_work/OELLM_prod2026/container_images/post-training-flash-attn-3.sif
  bind_mounts:
    - /leonardo_scratch/large/userexternal/acubagyl:/leonardo_scratch/large/userexternal/acubagyl
    - /leonardo_work/OELLM_prod2026/users/acubagyl:/leonardo_work/OELLM_prod2026/users/acubagyl
  env_file: env/leonardo.env

# -- Model -------------------------------------------------------------------
model:
  name_or_path: "allenai/Olmo-3-1025-7B"
  attn_implementation: "flash_attention_3"
  dtype: "bfloat16"

# -- Training hyper-parameters -----------------------------------------------
training:
  max_steps: 10                              # Set explicitly, OR use num_training_samples below
  num_training_samples: null

  learning_rate: 5.0e-7
  effective_batch_size: 4
  per_device_train_batch_size: 1
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine_with_min_lr"
  lr_scheduler_kwargs:
    min_lr_rate: 0.1
  gradient_checkpointing: true
  bf16: true
  seed: 42
  use_liger_kernel: true

# -- DPO method parameters ---------------------------------------------------
dpo:
  beta: 5.0
  loss_type: "sigmoid"                       # "sigmoid" | "hinge" | "ipo" | etc.
  ref_model_name_or_path: null               # null → TRL creates an implicit copy
  max_seq_length: 2048

# -- Checkpointing -----------------------------------------------------------
checkpointing:
  save_steps: 200
  save_total_limit: 2                        # Full checkpoints to keep
  inference_checkpoint_steps: 200            # Minimal inference model interval (set to null to disable)
  inference_checkpoint_path: "inference_checkpoints"   # Relative to run dir

# -- Data mix ----------------------------------------------------------------
data:
  chat_template: "olmo3"                     # Name from chat template registry
  num_proc: null                             # null = auto-detect, capped at 32
  datasets:
    - name: "roundtrip_sv"
      path: "json"
      data_dir: ${paths.output_base}/data
      split: "train"
      weight: 1.0
      transform: unconditional_dpo                        # null = already "chosen" / "rejected" columns

# -- DeepSpeed ---------------------------------------------------------------
deepspeed:
  config_path: "configs/deepspeed/zero3.yaml"

# -- Accelerate launch flags -------------------------------------------------
accelerate:
  mixed_precision: "bf16"
  use_deepspeed: true
  deepspeed_multinode_launcher: "standard"   # "standard" | "pdsh" | etc.
  same_network: true                         # All nodes on same network
  rdzv_backend: "static"                     # "static" | "c10d" | "etcd"
  dynamo_backend: "inductor"                 # "inductor" | "no" | etc.

# -- Logging & tracking ------------------------------------------------------
logging:
  report_to:
    - "wandb"
    - "tensorboard"
  wandb_project: "raw-dpo-training"
  logging_steps: 1
  include_num_input_tokens_seen: "non_padding"

# -- SLURM -------------------------------------------------------------------
slurm:
  account: "OELLM_prod2026"
  partition: "boost_usr_prod"
  num_nodes: 1
  gpus_per_node: 4
  cpus_per_task: 32
  wall_time: "02:00:00"
  job_name: "raw-dpo-training"
  signal_time_seconds: 300                   # SIGUSR1 sent this many seconds before timeout to trigger self-healing
  max_failures: 3                            # Self-healing retry limit

# -- Debug mode --------------------------------------------------------------
debug:
  enabled: false
  override_existing: false

# -- Output paths -------------------------------------------------------------
paths:
  output_base: "/leonardo_work/OELLM_prod2026/users/acubagyl/scratch"
  debug_base: ${paths.output_base}/debug
